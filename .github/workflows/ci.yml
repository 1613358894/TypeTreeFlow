name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            git fetch --depth=1 origin "pull/${{ github.event.pull_request.number }}/merge"
          else
            git fetch --depth=1 origin "${GITHUB_SHA}"
          fi
          git checkout --detach FETCH_HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests
        run: pytest -p no:cacheprovider --basetemp .pytest_tmp

      - name: Check docs hygiene
        run: python scripts/check_docs_hygiene.py

      - name: Check CLI help
        run: python typetreeflow.py --help

  build:
    name: Build wheel
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            git fetch --depth=1 origin "pull/${{ github.event.pull_request.number }}/merge"
          else
            git fetch --depth=1 origin "${GITHUB_SHA}"
          fi
          git checkout --detach FETCH_HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip wheel . --no-deps -w .dist_test
